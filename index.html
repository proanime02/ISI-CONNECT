<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ISI Connect — Bibliothèque L1 Réseau Info</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  :root{
    --bg:#F6F5F2;
    --surface:#FFFFFF;
    --ink:#171B1F;
    --muted:#6B7278;
    --line:#E4E1DB;
    --accent:#0E7C7B;
    --accent-dark:#0B5F5E;
    --accent-tint:#E4F3F2;
    --warn:#C0392B;
    --radius:10px;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    background:var(--bg);
    color:var(--ink);
    font-family:'Inter',sans-serif;
    -webkit-font-smoothing:antialiased;
  }
  h1,h2,h3,.display{font-family:'Space Grotesk',sans-serif;}
  .mono{font-family:'JetBrains Mono',monospace;}

  header{
    background:var(--surface);
    border-bottom:1px solid var(--line);
    padding:18px 28px;
    display:flex;
    align-items:center;
    justify-content:space-between;
    position:sticky;
    top:0;
    z-index:10;
  }
  .brand{display:flex;align-items:center;gap:10px;}
  .brand-mark{width:26px;height:26px;flex-shrink:0;}
  .brand-text{display:flex;flex-direction:column;line-height:1.15;}
  .brand-text strong{font-size:16px;font-weight:700;}
  .brand-text span{font-size:11.5px;color:var(--muted);font-family:'JetBrains Mono',monospace;letter-spacing:.02em;}

  .header-right{display:flex;align-items:center;gap:14px;}
  .doc-count{font-family:'JetBrains Mono',monospace;font-size:12.5px;color:var(--muted);}
  button{font-family:'Inter',sans-serif;cursor:pointer;border:none;}
  .btn-primary{
    background:var(--ink);color:#fff;
    padding:10px 18px;border-radius:8px;
    font-size:14px;font-weight:600;
    display:flex;align-items:center;gap:6px;
  }
  .btn-primary:hover{background:#000;}
  .btn-secondary{
    background:var(--surface);color:var(--ink);
    border:1px solid var(--line);
    padding:9px 16px;border-radius:8px;
    font-size:13.5px;font-weight:600;
  }
  .btn-secondary:hover{border-color:var(--accent);color:var(--accent-dark);}
  .btn-secondary:disabled{opacity:.5;cursor:not-allowed;}

  main{max-width:920px;margin:0 auto;padding:26px 24px 80px;}

  .controls{display:flex;gap:10px;margin-bottom:14px;flex-wrap:wrap;}
  .controls input[type=text]{
    flex:1;min-width:220px;
    padding:11px 14px;
    border:1px solid var(--line);
    border-radius:8px;
    background:var(--surface);
    font-size:14px;
  }
  .controls select{
    flex:0 0 auto;
    padding:11px 12px;
    border:1px solid var(--line);
    border-radius:8px;
    background:var(--surface);
    font-size:14px;
    color:var(--ink);
  }
  .controls input:focus,.controls select:focus{outline:2px solid var(--accent);outline-offset:1px;}

  .result-meta{font-family:'JetBrains Mono',monospace;font-size:12px;color:var(--muted);margin-bottom:14px;}

  .doc-list{display:flex;flex-direction:column;gap:1px;background:var(--line);border:1px solid var(--line);border-radius:var(--radius);overflow:hidden;}
  .doc-row{
    background:var(--surface);
    padding:16px 18px;
    display:flex;gap:14px;
    align-items:flex-start;
  }
  .doc-icon{
    width:38px;height:38px;border-radius:8px;
    background:var(--accent-tint);color:var(--accent-dark);
    display:flex;align-items:center;justify-content:center;
    font-family:'JetBrains Mono',monospace;font-size:11px;font-weight:600;
    flex-shrink:0;
  }
  .doc-body{flex:1;min-width:0;}
  .doc-title-row{display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-bottom:4px;}
  .doc-title{font-size:14.5px;font-weight:600;overflow-wrap:anywhere;}
  .badge{
    font-size:10.5px;font-weight:600;
    padding:2.5px 8px;border-radius:20px;
    font-family:'JetBrains Mono',monospace;
    letter-spacing:.02em;
    white-space:nowrap;
  }
  .doc-desc{
    font-size:13px;color:var(--muted);line-height:1.5;margin:0 0 8px;max-width:640px;
    display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;
  }
  .doc-meta{display:flex;gap:14px;font-size:11.5px;color:var(--muted);font-family:'JetBrains Mono',monospace;flex-wrap:wrap;}
  .doc-action{flex-shrink:0;display:flex;align-items:center;}
  .icon-btn{
    width:36px;height:36px;border-radius:8px;
    display:flex;align-items:center;justify-content:center;
    background:transparent;border:1px solid transparent;
    color:var(--muted);transition:background .15s,color .15s,border-color .15s;
  }
  .icon-btn:hover{background:var(--accent-tint);color:var(--accent-dark);border-color:var(--line);}
  .icon-btn svg{width:17px;height:17px;}

  .empty-state{padding:60px 20px;text-align:center;color:var(--muted);}

  /* Modals */
  .overlay{
    position:fixed;inset:0;background:rgba(23,27,31,.45);
    display:none;align-items:flex-start;justify-content:center;
    padding:40px 16px;overflow-y:auto;z-index:100;
  }
  .overlay.open{display:flex;}
  .modal{
    background:var(--surface);
    border-radius:14px;
    width:100%;max-width:440px;
    padding:26px;
    box-shadow:0 20px 60px rgba(0,0,0,.18);
  }
  .modal h2{font-size:18px;margin:0 0 4px;}
  .modal .sub{font-size:12.5px;color:var(--muted);margin:0 0 20px;}
  .field{margin-bottom:14px;}
  .field label{display:block;font-size:12.5px;font-weight:600;margin-bottom:6px;}
  .field input[type=text],.field input[type=email],.field input[type=password],.field select,.field textarea{
    width:100%;padding:10px 12px;border:1px solid var(--line);border-radius:8px;font-size:14px;font-family:'Inter',sans-serif;
  }
  .field textarea{resize:vertical;min-height:70px;}
  .type-toggle{display:flex;gap:8px;margin-bottom:14px;}
  .type-toggle button{
    flex:1;padding:9px;border:1px solid var(--line);border-radius:8px;
    background:var(--surface);font-size:13px;font-weight:600;color:var(--muted);
  }
  .type-toggle button.active{border-color:var(--accent);color:var(--accent-dark);background:var(--accent-tint);}
  .modal-actions{display:flex;gap:10px;margin-top:18px;}
  .modal-actions button{flex:1;padding:11px;border-radius:8px;font-size:14px;font-weight:600;}
  .btn-cancel{background:var(--bg);color:var(--ink);border:1px solid var(--line);}
  .btn-submit{background:var(--ink);color:#fff;}
  .btn-submit:disabled{opacity:.5;cursor:not-allowed;}
  .error-msg{color:var(--warn);font-size:12.5px;margin-top:4px;display:none;}
  .close-x{position:absolute;top:18px;right:18px;background:none;font-size:18px;color:var(--muted);}
  .modal{position:relative;}

  .player-frame{width:100%;aspect-ratio:16/9;border:none;border-radius:8px;}

  /* Sidebar (Nouveau document) */
  .overlay.sidebar-mode{justify-content:flex-end;align-items:stretch;padding:0;}
  .sidebar-panel{
    border-radius:16px 0 0 16px;
    max-width:420px;
    height:100%;
    overflow-y:auto;
    box-shadow:-16px 0 48px rgba(0,0,0,.16);
    transform:translateX(100%);
    transition:transform .3s ease;
  }
  .overlay.sidebar-mode.open .sidebar-panel{transform:translateX(0);}

  @media (max-width:820px){
    main{max-width:100%;}
  }

  @media (max-width:640px){
    header{padding:12px 16px;}
    .brand-text span{display:none;}
    .header-right{gap:8px;}
    .doc-count{display:none;}
    main{padding:16px 12px 60px;}
    .controls{gap:8px;}
    .controls input[type=text]{min-width:100%;flex:1 1 100%;}
    .controls select{flex:1 1 calc(50% - 4px);min-width:0;}
    .doc-row{padding:14px;gap:10px;}
    .doc-icon{width:32px;height:32px;font-size:10px;}
    .doc-title{font-size:13.5px;}
    .doc-desc{max-width:100%;}
    .doc-meta{gap:10px;font-size:11px;}
    .modal{padding:20px;}
    .sidebar-panel{max-width:100%;border-radius:0;}
  }

  @media (max-width:380px){
    .doc-meta span:nth-child(3){display:none;}
  }
</style>
</head>
<body>

<header>
  <div class="brand">
    <svg class="brand-mark" viewBox="0 0 26 26" fill="none">
      <circle cx="5" cy="6" r="3" fill="#0E7C7B"/>
      <circle cx="21" cy="6" r="3" fill="#0E7C7B"/>
      <circle cx="13" cy="20" r="3" fill="#171B1F"/>
      <line x1="5" y1="6" x2="13" y2="20" stroke="#0E7C7B" stroke-width="1.6"/>
      <line x1="21" y1="6" x2="13" y2="20" stroke="#0E7C7B" stroke-width="1.6"/>
      <line x1="5" y1="6" x2="21" y2="6" stroke="#0E7C7B" stroke-width="1.6"/>
    </svg>
    <div class="brand-text">
      <strong>ISI Connect</strong>
      <span>L1 RÉSEAU INFORMATIQUE — BIBLIOTHÈQUE</span>
    </div>
  </div>
  <div class="header-right">
    <span class="doc-count mono" id="docCount">— docs</span>
    <button class="btn-primary" id="openUploadFlow">+ Publier</button>
  </div>
</header>

<main>
  <div class="controls">
    <input type="text" id="searchInput" placeholder="Rechercher un document...">
    <select id="matiereFilter"><option value="">Toutes les matières</option></select>
    <select id="typeFilter"><option value="">Tous les types</option></select>
  </div>
  <div class="result-meta" id="resultMeta"></div>
  <div class="doc-list" id="docList"></div>
</main>

<!-- Lecteur vidéo -->
<div class="overlay" id="playerOverlay">
  <div class="modal" style="max-width:640px;">
    <button class="close-x" onclick="closeOverlay('playerOverlay')">✕</button>
    <h2 id="playerTitle" style="margin-bottom:14px;"></h2>
    <iframe class="player-frame" id="playerFrame" src="" allow="autoplay; encrypted-media" allowfullscreen></iframe>
  </div>
</div>

<!-- Login uploadeur -->
<div class="overlay" id="loginOverlay">
  <div class="modal">
    <button class="close-x" onclick="closeOverlay('loginOverlay')">✕</button>
    <h2>Connexion uploadeur</h2>
    <p class="sub">Réservé aux comptes autorisés à publier. Pas de compte ? Demande à l'admin.</p>
    <div class="field">
      <label>Email</label>
      <input type="email" id="loginEmail">
    </div>
    <div class="field">
      <label>Mot de passe</label>
      <input type="password" id="loginPassword">
    </div>
    <p class="error-msg" id="loginError"></p>
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeOverlay('loginOverlay')">Annuler</button>
      <button class="btn-submit" id="loginSubmit">Se connecter</button>
    </div>
  </div>
</div>

<!-- Nouveau document -->
<div class="overlay sidebar-mode" id="uploadOverlay">
  <div class="modal sidebar-panel">
    <button class="close-x" onclick="closeOverlay('uploadOverlay')">✕</button>
    <h2>Nouveau document</h2>
    <p class="sub" id="uploadAs"></p>

    <div class="field">
      <label>Titre</label>
      <input type="text" id="docTitre">
    </div>

    <div class="field">
      <label>Matière</label>
      <select id="docMatiere"></select>
    </div>

    <div class="field">
      <label>Type de document</label>
      <select id="docType"></select>
    </div>

    <div class="type-toggle">
      <button type="button" id="toggleFile" class="active">Fichier</button>
      <button type="button" id="toggleVideo">Vidéo YouTube</button>
    </div>

    <div class="field" id="fileField">
      <label>Fichier (PDF, Word, Excel, PowerPoint, ZIP, image)</label>
      <input type="file" id="docFile" accept=".pdf,.doc,.docx,.xls,.xlsx,.ppt,.pptx,.zip,.rar,.7z,.jpg,.jpeg,.png,.gif,.webp,.txt">
    </div>

    <div class="field" id="videoField" style="display:none;">
      <label>Lien YouTube (non répertorié)</label>
      <input type="text" id="docYoutube" placeholder="https://youtube.com/watch?v=...">
    </div>

    <div class="field">
      <label>Description</label>
      <textarea id="docDescription"></textarea>
    </div>

    <p class="error-msg" id="uploadError"></p>
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeOverlay('uploadOverlay')">Annuler</button>
      <button class="btn-submit" id="uploadSubmit">Publier</button>
    </div>
  </div>
</div>

<script>
// ============================================================
// CONFIG
// ============================================================
const SUPABASE_URL = 'https://ibwpitarivzhfrcumhdd.supabase.co';
const SUPABASE_ANON_KEY = 'sb_publishable_MqBX4km_9hUSEz2AmYFguQ_0Uw7gTfu';
const WORKER_URL = 'https://isi-connect-worker.isi-connect-codezen.workers.dev';
const sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

const MATIERES = [
  'Cryptographie','Fondamentaux cybersécurité','Algorithme','Fondamentaux Réseau',
  'Langage C','Technologie web','Électronique','Électricité','Maths',
  "Système d'exploitation",'Bureautique et IA générative','SGBD'
];

const TYPES = ['Cours','TD','TP','Note','Examen','Devoir','Corrigé','Support','Projet','Autres'];

const TYPE_STYLES = {
  'Cours':   {bg:'#E4F3F2', fg:'#0E7C7B'},
  'TD':      {bg:'#FBF0DC', fg:'#B8860B'},
  'TP':      {bg:'#ECE8F4', fg:'#6B5B95'},
  'Note':    {bg:'#EAEDEF', fg:'#5B6670'},
  'Examen':  {bg:'#FBE7E4', fg:'#C0392B'},
  'Devoir':  {bg:'#E5EEF6', fg:'#3B6FA0'},
  'Corrigé': {bg:'#E8F4E9', fg:'#3F9142'},
  'Support': {bg:'#F3EAE1', fg:'#8A5A34'},
  'Projet':  {bg:'#F6E7EE', fg:'#B85C8A'},
  'Autres':  {bg:'#EFEFEE', fg:'#6B7278'}
};

const ICON_DOWNLOAD = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3v12"/><path d="M7 10l5 5 5-5"/><path d="M5 21h14"/></svg>`;
const ICON_PLAY = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="9"/><path d="M10 8.5l6 3.5-6 3.5v-7z" fill="currentColor" stroke="none"/></svg>`;

// ============================================================
// STATE
// ============================================================
let allDocs = [];
let currentFiltered = [];
let currentUploader = null; // {id, nom, prenom}

// ============================================================
// INIT
// ============================================================
function populateSelect(select, items, placeholder){
  select.innerHTML = `<option value="">${placeholder}</option>` +
    items.map(i => `<option value="${i}">${i}</option>`).join('');
}
populateSelect(document.getElementById('matiereFilter'), MATIERES, 'Toutes les matières');
populateSelect(document.getElementById('typeFilter'), TYPES, 'Tous les types');
populateSelect(document.getElementById('docMatiere'), MATIERES, 'Choisir une matière');
populateSelect(document.getElementById('docType'), TYPES, 'Choisir un type');

async function loadDocs(){
  const { data, error } = await sb
    .from('documents')
    .select('*')
    .order('created_at', { ascending: false });
  if (error){ console.error(error); return; }
  allDocs = data;
  document.getElementById('docCount').textContent = `${data.length} doc${data.length>1?'s':''}`;
  renderDocs();
}

function renderDocs(){
  const q = document.getElementById('searchInput').value.trim().toLowerCase();
  const matiere = document.getElementById('matiereFilter').value;
  const type = document.getElementById('typeFilter').value;

  const filtered = allDocs.filter(d => {
    if (matiere && d.matiere !== matiere) return false;
    if (type && d.type !== type) return false;
    if (q && !(d.titre.toLowerCase().includes(q) || (d.description||'').toLowerCase().includes(q))) return false;
    return true;
  });

  document.getElementById('resultMeta').textContent = `${filtered.length} document${filtered.length>1?'s':''}`;
  currentFiltered = filtered;

  const list = document.getElementById('docList');
  if (filtered.length === 0){
    list.innerHTML = `<div class="empty-state">Aucun document ne correspond à ta recherche.</div>`;
    return;
  }

  list.innerHTML = filtered.map(d => {
    const style = TYPE_STYLES[d.type] || TYPE_STYLES['Autres'];
    const date = new Date(d.created_at).toLocaleDateString('fr-FR', {day:'2-digit', month:'2-digit', year:'numeric'});
    const sizeOrDuration = d.is_video ? 'Vidéo' : `${(d.taille_ko/1024).toFixed(1)} Mo`;
    const iconLabel = d.is_video ? '▶' : getFileExt(d.file_path);
    const actionLabel = d.is_video ? 'Regarder' : 'Télécharger';

    return `
      <div class="doc-row">
        <div class="doc-icon">${iconLabel}</div>
        <div class="doc-body">
          <div class="doc-title-row">
            <span class="doc-title">${escapeHtml(d.titre)}</span>
            <span class="badge" style="background:${style.bg};color:${style.fg}">${d.type}</span>
          </div>
          ${d.description ? `<p class="doc-desc">${escapeHtml(d.description)}</p>` : ''}
          <div class="doc-meta">
            <span>${d.matiere}</span>
            <span>${date}</span>
            <span>${sizeOrDuration}</span>
          </div>
        </div>
        <div class="doc-action">
          <button class="icon-btn" title="${actionLabel}" aria-label="${actionLabel}" data-doc-id="${d.id}">
            ${d.is_video ? ICON_PLAY : ICON_DOWNLOAD}
          </button>
        </div>
      </div>
    `;
  }).join('');
}

function escapeHtml(str){
  const div = document.createElement('div');
  div.textContent = str;
  return div.innerHTML;
}

function getFileExt(path){
  if (!path) return 'FILE';
  const ext = path.split('.').pop();
  return ext ? ext.toUpperCase().slice(0, 4) : 'FILE';
}

function handleDocAction(d){
  if (d.is_video){
    document.getElementById('playerTitle').textContent = d.titre;
    document.getElementById('playerFrame').src = `https://www.youtube.com/embed/${d.youtube_id}`;
    openOverlay('playerOverlay');
  } else {
    const url = `${WORKER_URL}/file/${encodeURIComponent(d.file_path)}`;
    window.open(url, '_blank');
  }
}

document.getElementById('searchInput').addEventListener('input', renderDocs);
document.getElementById('matiereFilter').addEventListener('change', renderDocs);
document.getElementById('typeFilter').addEventListener('change', renderDocs);

document.getElementById('docList').addEventListener('click', (e) => {
  const btn = e.target.closest('[data-doc-id]');
  if (!btn) return;
  const doc = allDocs.find(d => d.id === btn.dataset.docId);
  if (doc) handleDocAction(doc);
});

// ============================================================
// OVERLAYS
// ============================================================
function openOverlay(id){ document.getElementById(id).classList.add('open'); }
function closeOverlay(id){
  document.getElementById(id).classList.remove('open');
  if (id === 'playerOverlay') document.getElementById('playerFrame').src = '';
}

// ============================================================
// LOGIN UPLOADEUR
// ============================================================
document.getElementById('openUploadFlow').addEventListener('click', async () => {
  const { data: { session } } = await sb.auth.getSession();
  if (session){
    const ok = await checkUploaderStatus(session.user.id);
    if (ok) { openUploadModal(); return; }
  }
  openOverlay('loginOverlay');
});

async function checkUploaderStatus(userId){
  const { data, error } = await sb.from('uploaders').select('*').eq('id', userId).single();
  if (error || !data || data.statut !== 'actif'){
    currentUploader = null;
    return false;
  }
  currentUploader = data;
  return true;
}

document.getElementById('loginSubmit').addEventListener('click', async () => {
  const email = document.getElementById('loginEmail').value.trim();
  const password = document.getElementById('loginPassword').value;
  const errEl = document.getElementById('loginError');
  errEl.style.display = 'none';

  const { data, error } = await sb.auth.signInWithPassword({ email, password });
  if (error){
    errEl.textContent = 'Identifiants incorrects.';
    errEl.style.display = 'block';
    return;
  }
  const ok = await checkUploaderStatus(data.user.id);
  if (!ok){
    errEl.textContent = "Ce compte n'est pas autorisé à publier (suspendu ou introuvable).";
    errEl.style.display = 'block';
    await sb.auth.signOut();
    return;
  }
  closeOverlay('loginOverlay');
  document.getElementById('loginEmail').value = '';
  document.getElementById('loginPassword').value = '';
  openUploadModal();
});

// ============================================================
// UPLOAD DOCUMENT
// ============================================================
function openUploadModal(){
  document.getElementById('uploadAs').textContent = `Publié en tant que ${currentUploader.prenom} ${currentUploader.nom}`;
  openOverlay('uploadOverlay');
}

let uploadMode = 'file';
document.getElementById('toggleFile').addEventListener('click', () => {
  uploadMode = 'file';
  document.getElementById('toggleFile').classList.add('active');
  document.getElementById('toggleVideo').classList.remove('active');
  document.getElementById('fileField').style.display = 'block';
  document.getElementById('videoField').style.display = 'none';
});
document.getElementById('toggleVideo').addEventListener('click', () => {
  uploadMode = 'video';
  document.getElementById('toggleVideo').classList.add('active');
  document.getElementById('toggleFile').classList.remove('active');
  document.getElementById('videoField').style.display = 'block';
  document.getElementById('fileField').style.display = 'none';
});

function sanitizeForStorage(str){
  return str
    .normalize('NFD').replace(/[\u0300-\u036f]/g, '') // retire les accents
    .replace(/[^a-zA-Z0-9._-]+/g, '_')                  // remplace espaces/apostrophes/etc par _
    .replace(/_+/g, '_')                                // évite les _ multiples
    .replace(/^_|_$/g, '');                             // enlève les _ en bord de chaîne
}

function extractYoutubeId(url){
  const m = url.match(/(?:youtube\.com\/(?:watch\?v=|embed\/)|youtu\.be\/)([a-zA-Z0-9_-]{11})/);
  return m ? m[1] : null;
}

document.getElementById('uploadSubmit').addEventListener('click', async () => {
  const errEl = document.getElementById('uploadError');
  errEl.style.display = 'none';
  const submitBtn = document.getElementById('uploadSubmit');

  const titre = document.getElementById('docTitre').value.trim();
  const matiere = document.getElementById('docMatiere').value;
  const type = document.getElementById('docType').value;
  const description = document.getElementById('docDescription').value.trim();

  if (!titre || !matiere || !type){
    errEl.textContent = 'Titre, matière et type sont obligatoires.';
    errEl.style.display = 'block';
    return;
  }

  submitBtn.disabled = true;
  submitBtn.textContent = 'Publication...';

  try {
    if (uploadMode === 'video'){
      const url = document.getElementById('docYoutube').value.trim();
      const youtubeId = extractYoutubeId(url);
      if (!youtubeId) throw new Error("Lien YouTube invalide.");

      const { error } = await sb.from('documents').insert({
        titre, description, matiere, type,
        is_video: true, youtube_id: youtubeId,
        uploader_id: currentUploader.id
      });
      if (error) throw error;

    } else {
      const fileInput = document.getElementById('docFile');
      const file = fileInput.files[0];
      if (!file) throw new Error("Sélectionne un fichier.");

      const safeMatiere = sanitizeForStorage(matiere);
      const safeFileName = sanitizeForStorage(file.name);
      const path = `${safeMatiere}/${Date.now()}_${safeFileName}`;

      const { data: { session } } = await sb.auth.getSession();
      const uploadRes = await fetch(`${WORKER_URL}/upload`, {
        method: 'PUT',
        headers: {
          'Authorization': `Bearer ${session.access_token}`,
          'X-File-Key': path,
          'Content-Type': file.type || 'application/octet-stream'
        },
        body: file
      });
      if (!uploadRes.ok) throw new Error("Échec de l'upload vers le stockage (" + uploadRes.status + ")");

      const { error } = await sb.from('documents').insert({
        titre, description, matiere, type,
        is_video: false, file_path: path,
        taille_ko: Math.round(file.size / 1024),
        uploader_id: currentUploader.id
      });
      if (error) throw error;
    }

    closeOverlay('uploadOverlay');
    resetUploadForm();
    loadDocs();

  } catch (e) {
    errEl.textContent = e.message || "Erreur lors de la publication.";
    errEl.style.display = 'block';
  } finally {
    submitBtn.disabled = false;
    submitBtn.textContent = 'Publier';
  }
});

function resetUploadForm(){
  document.getElementById('docTitre').value = '';
  document.getElementById('docMatiere').value = '';
  document.getElementById('docType').value = '';
  document.getElementById('docDescription').value = '';
  document.getElementById('docFile').value = '';
  document.getElementById('docYoutube').value = '';
}

// ============================================================
// START
// ============================================================
loadDocs();
</script>
</body>
</html>
